<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="henGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ccff;stop-opacity:1" />
    </linearGradient>
    <filter id="henGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect x="10" y="10" width="180" height="180" fill="none" stroke="#0a1f3f" stroke-width="1" rx="5"/>
  
  <!-- Letter H shape with neon effect -->
  <!-- Left vertical line -->
  <line x1="55" y1="50" x2="55" y2="150" stroke="url(#henGrad)" stroke-width="6" stroke-linecap="round" filter="url(#henGlow)"/>
  
  <!-- Right vertical line -->
  <line x1="115" y1="50" x2="115" y2="150" stroke="url(#henGrad)" stroke-width="6" stroke-linecap="round" filter="url(#henGlow)"/>
  
  <!-- Horizontal connector -->
  <line x1="55" y1="100" x2="115" y2="100" stroke="url(#henGrad)" stroke-width="6" stroke-linecap="round" filter="url(#henGlow)"/>
  
  <!-- Decorative dots -->
  <circle cx="40" cy="50" r="3" fill="#00ff88" filter="url(#henGlow)"/>
  <circle cx="130" cy="50" r="3" fill="#00ccff" filter="url(#henGlow)"/>
  <circle cx="40" cy="150" r="3" fill="#00ccff" filter="url(#henGlow)"/>
  <circle cx="130" cy="150" r="3" fill="#ff00ff" filter="url(#henGlow)"/>
  
  <!-- Grid background -->
  <g opacity="0.2" stroke="url(#henGrad)" stroke-width="0.5">
    <line x1="30" y1="30" x2="170" y2="30"/>
    <line x1="30" y1="60" x2="170" y2="60"/>
    <line x1="30" y1="90" x2="170" y2="90"/>
    <line x1="30" y1="120" x2="170" y2="120"/>
    <line x1="30" y1="150" x2="170" y2="150"/>
  </g>
</svg>
