<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="minimalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ccff;stop-opacity:1" />
    </linearGradient>
    <filter id="minimalGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Central geometric shape - Abstract P -->
  <!-- Top arc -->
  <path d="M 80 60 Q 120 60 120 90 Q 120 110 100 115" 
        fill="none" stroke="url(#minimalGrad)" stroke-width="5" stroke-linecap="round" filter="url(#minimalGlow)"/>
  
  <!-- Vertical stem -->
  <line x1="80" y1="55" x2="80" y2="155" stroke="url(#minimalGrad)" stroke-width="5" stroke-linecap="round" filter="url(#minimalGlow)"/>
  
  <!-- Connecting line -->
  <line x1="80" y1="115" x2="100" y2="115" stroke="url(#minimalGrad)" stroke-width="5" stroke-linecap="round" filter="url(#minimalGlow)"/>
  
  <!-- Pulse circles -->
  <circle cx="100" cy="100" r="40" fill="none" stroke="url(#minimalGrad)" stroke-width="1" opacity="0.3"/>
  <circle cx="100" cy="100" r="30" fill="none" stroke="url(#minimalGrad)" stroke-width="1" opacity="0.5"/>
  
  <!-- Center dot -->
  <circle cx="80" cy="155" r="4" fill="url(#minimalGrad)" filter="url(#minimalGlow)"/>
  
  <!-- Accent lines -->
  <line x1="140" y1="80" x2="160" y2="80" stroke="#00ff88" stroke-width="2" stroke-linecap="round"/>
  <line x1="140" y1="120" x2="160" y2="120" stroke="#00ccff" stroke-width="2" stroke-linecap="round"/>
</svg>
