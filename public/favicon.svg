<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff88" />
      <stop offset="100%" stop-color="#00ccff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" fill="#0a1f3f" />
  
  <!-- Hexagon with gradient -->
  <path d="M 50 15 L 80 30 L 80 70 L 50 85 L 20 70 L 20 30 Z" 
        fill="none" stroke="url(#neonGrad)" stroke-width="2.5" filter="url(#glow)"/>
  
  <!-- Inner circle -->
  <circle cx="50" cy="50" r="20" fill="none" stroke="url(#neonGrad)" stroke-width="1.5" filter="url(#glow)"/>
  
  <!-- Center dot -->
  <circle cx="50" cy="50" r="3" fill="url(#neonGrad)" filter="url(#glow)"/>
  
  <!-- Corner accents -->
  <line x1="15" y1="15" x2="22" y2="15" stroke="#00ff88" stroke-width="1.5" filter="url(#glow)"/>
  <line x1="15" y1="15" x2="15" y2="22" stroke="#00ff88" stroke-width="1.5" filter="url(#glow)"/>
  
  <line x1="85" y1="15" x2="78" y2="15" stroke="#00ccff" stroke-width="1.5" filter="url(#glow)"/>
  <line x1="85" y1="15" x2="85" y2="22" stroke="#00ccff" stroke-width="1.5" filter="url(#glow)"/>
  <line x1="15" y1="50" x2="85" y2="50" stroke="#ffffff" stroke-opacity="0.1" stroke-dasharray="2 2" />
  
  <!-- Central core symbol -->
  <polygon points="50,28 72,50 50,72 28,50" fill="none" stroke="url(#neonGrad)" stroke-width="3" filter="url(#glow)" />
  <circle cx="50" cy="50" r="8" fill="#22d3ee" filter="url(#glow)" />
</svg>
